<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 1.2 - Bootstrap via npm/Downloaded Files</title>
  <!--
    INSTRUCTIONS (npm setup):
    1. Run: npm init -y
    2. Run: npm install bootstrap
    3. Replace the CDN link below with: node_modules/bootstrap/dist/css/bootstrap.min.css
    
    OR use downloaded files:
    Download from https://getbootstrap.com and link locally:
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
  -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <h1 class="display-4">Bootstrap via npm / Downloaded Files</h1>
    <p class="text-muted">Replace the CDN link with a local path to use downloaded Bootstrap files.</p>
    <div class="alert alert-info">Tip: Run <code>npm install bootstrap</code> and update the link path.</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
